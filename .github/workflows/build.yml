name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Create .next folder for Capacitor
        run: |
          mkdir -p .next
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=https://music-player-wheat-gamma.vercel.app/"></head><body></body></html>' > .next/index.html

      - name: Remove old android folder if exists
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Create static web folder
        run: |
          mkdir -p android/app/src/main/assets/public
          echo '<!DOCTYPE html>
          <html>
          <head>
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0;url=https://music-player-wheat-gamma.vercel.app/">
          </head>
          <body>
            <p>Loading Music Player...</p>
          </body>
          </html>' > android/app/src/main/assets/public/index.html

      - name: Build APK with Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: music-player.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30